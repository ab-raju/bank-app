<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank Of Bharat - Login</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22><stop offset=%220%25%22 stop-color=%22%23f5d97b%22/><stop offset=%22100%25%22 stop-color=%22%23b8860b%22/></linearGradient></defs><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22url(%23g)%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 font-size=%2262%22 font-family=%22Arial%22 fill=%22white%22>₹</text></svg>"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22><stop offset=%220%25%22 stop-color=%22%23f5d97b%22/><stop offset=%22100%25%22 stop-color=%22%23b8860b%22/></linearGradient></defs><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22url(%23g)%22/><text x=%2250%22 y=%2252%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 font-size=%2260%22 font-family=%22Arial%22 fill=%22white%22>₹</text></svg>">

  <link rel="stylesheet" href="style.css"/> 
</head>
<body>
<div class="auth-wrap">

  <!-- Left -->
  <div class="auth-left">
    <div class="brand">
      <div class="brand-icon">₹</div>
      <span class="brand-name">Bank Of Bharat</span>
    </div>
    <div class="auth-hero">
      <h1>Banking,<br/>simplified.</h1>
      <p>Manage your money with clarity and confidence.</p>
    </div>
    <div class="auth-stats">
      <div><span class="stat-num">100%</span><span class="stat-label">Secure</span></div>
      <div><span class="stat-num">24/7</span><span class="stat-label">Access</span></div>
      <div><span class="stat-num">₹0</span><span class="stat-label">Hidden Fees</span></div>
    </div>
  </div>

  <!-- Right -->
  <div class="auth-right">
    <div class="card">
      <h2>Welcome back</h2>
      <p class="card-sub">Sign in to your account</p>

      <div id="msg" class="msg hidden"></div>

      <div class="field">
        <label>Account Number</label>
        <input type="number" id="accNo" placeholder="e.g. 100001"/>
      </div>
      <div class="field">
        <label>PIN</label>
        <input type="password" id="pin" placeholder="Enter your PIN" maxlength="6"/>
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

      <div class="auth-foot">
        <p>No account? <a href="register.html">Open Account</a></p>
        <p><a href="admin.html">Admin Panel →</a></p>
      </div>
    </div>
  </div>

</div>
<script src="app.js"></script>
<script>
async function doLogin() {
  const btn   = document.getElementById('loginBtn');
  const accNo = document.getElementById('accNo').value.trim();
  const pin   = document.getElementById('pin').value.trim();
  if (!accNo || !pin) { showMsg('msg','Fill in all fields.','err'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  const res = await api('/api/login','POST',{accountNo:accNo, pin});
  if (res.success) {
    saveSession(res.account);
    location.href = 'dashboard.html';
  } else {
    showMsg('msg', res.message, 'err');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>

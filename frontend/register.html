<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank Of Bharat - Open Account</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22><stop offset=%220%25%22 stop-color=%22%23f5d97b%22/><stop offset=%22100%25%22 stop-color=%22%23b8860b%22/></linearGradient></defs><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22url(%23g)%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 font-size=%2262%22 font-family=%22Arial%22 fill=%22white%22>₹</text></svg>"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22><stop offset=%220%25%22 stop-color=%22%23f5d97b%22/><stop offset=%22100%25%22 stop-color=%22%23b8860b%22/></linearGradient></defs><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22url(%23g)%22/><text x=%2250%22 y=%2252%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 font-size=%2260%22 font-family=%22Arial%22 fill=%22white%22>₹</text></svg>">
  
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrap">

  <div class="auth-left">
    <div class="brand">
      <div class="brand-icon">₹</div>
      <span class="brand-name">Bank Of Bharat</span>
    </div>
    <div class="auth-hero">
      <h1>Join us<br/>today.</h1>
      <p>Open a free account in under 2 minutes.</p>
    </div>
    <div class="auth-stats">
      <div><span class="stat-num">₹500</span><span class="stat-label">Min Deposit</span></div>
      <div><span class="stat-num">Free</span><span class="stat-label">Account</span></div>
      <div><span class="stat-num">Safe</span><span class="stat-label">& Secure</span></div>
    </div>
  </div>

  <div class="auth-right">
    <div class="card" style="max-width:480px">
      <h2>Open Account</h2>
      <p class="card-sub">Fill in your details below</p>

      <div id="msg" class="msg hidden"></div>

      <div class="row">
        <div class="field"><label>Full Name</label><input type="text" id="name" placeholder="Raj Kumar"/></div>
        <div class="field"><label>Phone (10 digits)</label><input type="tel" id="phone" maxlength="10" placeholder="9876543210"/></div>
      </div>
      <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@gmail.com"/></div>
      <div class="row">
        <div class="field">
          <label>Account Type</label>
          <select id="accType">
            <option value="SAVINGS">Savings</option>
            <option value="CURRENT">Current</option>
          </select>
        </div>
        <div class="field"><label>Initial Deposit (₹)</label><input type="number" id="deposit" placeholder="Min 500" min="500"/></div>
      </div>
      <div class="row">
        <div class="field"><label>Set PIN</label><input type="password" id="pin" maxlength="6" placeholder="4-6 digits"/></div>
        <div class="field"><label>Confirm PIN</label><input type="password" id="cpin" maxlength="6" placeholder="Re-enter PIN"/></div>
      </div>
      <button class="btn" id="regBtn" onclick="doRegister()">Create Account</button>

      <div class="auth-foot">
        <p>Already have an account? <a href="index.html">Sign In</a></p>
      </div>
    </div>
  </div>

</div>

<!-- Success Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div style="font-size:2.5rem;margin-bottom:0.75rem">✅</div>
    <h3>Account Created!</h3>
    <p>Your account number is:</p>
    <span class="acc-num" id="newAccNo">—</span>
    <p class="note">Save this number - you need it to login!</p>
    <a href="index.html" class="btn" style="display:block;text-align:center">Go to Login</a>
  </div>
</div>

<script src="app.js"></script>
<script>
async function doRegister() {
  const btn  = document.getElementById('regBtn');
  const pin  = document.getElementById('pin').value.trim();
  const cpin = document.getElementById('cpin').value.trim();
  hideMsg('msg');
  if (pin !== cpin) { showMsg('msg','PINs do not match.','err'); return; }
  btn.disabled = true; btn.textContent = 'Creating...';
  const res = await api('/api/register','POST',{
    name:           document.getElementById('name').value.trim(),
    phone:          document.getElementById('phone').value.trim(),
    email:          document.getElementById('email').value.trim(),
    accountType:    document.getElementById('accType').value,
    initialDeposit: document.getElementById('deposit').value,
    pin
  });
  if (res.success) {
    document.getElementById('newAccNo').textContent = res.accountNo;
    document.getElementById('modal').classList.remove('hidden');
  } else {
    showMsg('msg', res.message, 'err');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
